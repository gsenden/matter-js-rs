<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>matter-rs demos</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --body-fill: rgba(88, 166, 255, 0.15);
    --body-stroke: #58a6ff;
    --static-fill: rgba(139, 148, 158, 0.15);
    --static-stroke: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.5;
  }
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }
  .demos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 1.5rem;
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  .demo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .demo-card h2 {
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .demo-card h2 button {
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .demo-card h2 button:hover { background: var(--accent); color: var(--bg); }
  .demo-card canvas {
    display: block;
    width: 100%;
    background: var(--bg);
    cursor: grab;
  }
  .demo-card canvas.dragging {
    cursor: grabbing;
  }
  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1><span>matter-rs</span> demos</h1>
  <p>2D rigid body physics engine &mdash; Rust/WASM port of Matter.js</p>
</header>

<div class="demos" id="demos"></div>

<footer>
  <a href="https://codeberg.org/gsenden/matter-rs">matter-rs on Codeberg</a>
  &middot; Rust port of <a href="https://brm.io/matter-js/">Matter.js</a>
</footer>

<script type="module">
import init, { PhysicsEngine } from './matter_wasm.js';

await init();

const DELTA = 1000 / 60;
const W = 600;
const H = 400;

const demos = [
  {
    name: 'Falling Bodies',
    setup(engine) {
      // Floor
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      // Walls
      engine.addRectangle(-15, H / 2, 30, H, true);
      engine.addRectangle(W + 15, H / 2, 30, H, true);
      // Random bodies
      for (let i = 0; i < 20; i++) {
        const x = 80 + Math.random() * (W - 160);
        const y = 50 + Math.random() * 150;
        if (Math.random() > 0.5) {
          engine.addRectangle(x, y, 20 + Math.random() * 30, 20 + Math.random() * 30, false);
        } else {
          engine.addCircle(x, y, 10 + Math.random() * 15, false);
        }
      }
    }
  },
  {
    name: 'Stacked Boxes',
    setup(engine) {
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      engine.addRectangle(-15, H / 2, 30, H, true);
      engine.addRectangle(W + 15, H / 2, 30, H, true);
      // Stack
      const cols = 8;
      const rows = 6;
      const size = 35;
      const startX = W / 2 - (cols * size) / 2 + size / 2;
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          engine.addRectangle(
            startX + col * size,
            H - 30 - size / 2 - row * size,
            size - 2, size - 2, false
          );
        }
      }
      // Projectile
      const ball = engine.addCircle(50, H / 2, 20, false);
      engine.setVelocity(ball, 12, -3);
    }
  },
  {
    name: 'Pendulum',
    setup(engine) {
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      // Chain of bodies connected by constraints
      const count = 6;
      const spacing = 40;
      const startX = W / 2 - ((count - 1) * spacing) / 2;
      const y = 60;
      let prev = null;
      for (let i = 0; i < count; i++) {
        const id = engine.addCircle(startX + i * spacing, y, 15, false);
        if (i === 0) {
          engine.addPinConstraint(id, startX, y, 0.9);
        }
        if (prev !== null) {
          engine.addConstraint(prev, id, 0.9);
        }
        prev = id;
      }
    }
  },
  {
    name: 'Ball Pool',
    setup(engine) {
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      engine.addRectangle(-15, H / 2, 30, H, true);
      engine.addRectangle(W + 15, H / 2, 30, H, true);
      // Ramp
      const ramp = engine.addRectangle(W / 2, H / 2, 300, 10, true);
      // Lots of circles
      for (let i = 0; i < 40; i++) {
        const x = 100 + Math.random() * (W - 200);
        const y = Math.random() * 200;
        engine.addCircle(x, y, 8 + Math.random() * 8, false);
      }
    }
  },
  {
    name: 'Mixed Shapes',
    setup(engine) {
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      engine.addRectangle(-15, H / 2, 30, H, true);
      engine.addRectangle(W + 15, H / 2, 30, H, true);
      for (let i = 0; i < 25; i++) {
        const x = 80 + Math.random() * (W - 160);
        const y = 50 + Math.random() * 200;
        const r = Math.random();
        if (r < 0.33) {
          engine.addRectangle(x, y, 20 + Math.random() * 30, 20 + Math.random() * 30, false);
        } else if (r < 0.66) {
          engine.addCircle(x, y, 10 + Math.random() * 15, false);
        } else {
          const sides = 3 + Math.floor(Math.random() * 5);
          engine.addPolygon(x, y, sides, 12 + Math.random() * 15, false);
        }
      }
    }
  },
  {
    name: 'Avalanche',
    setup(engine) {
      engine.addRectangle(W / 2, H - 15, W + 100, 30, true);
      engine.addRectangle(-15, H / 2, 30, H, true);
      engine.addRectangle(W + 15, H / 2, 30, H, true);
      // Angled shelves
      // We approximate angled platforms with thin static rectangles
      engine.addRectangle(W * 0.3, H * 0.35, 250, 10, true);
      engine.addRectangle(W * 0.7, H * 0.55, 250, 10, true);
      engine.addRectangle(W * 0.3, H * 0.75, 250, 10, true);
      // Rain of circles from top
      for (let i = 0; i < 50; i++) {
        const x = 80 + Math.random() * (W - 160);
        const y = -Math.random() * 300;
        engine.addCircle(x, y, 6 + Math.random() * 6, false);
      }
    }
  }
];

function createDemo(demo, container) {
  const card = document.createElement('div');
  card.className = 'demo-card';
  const header = document.createElement('h2');
  header.textContent = demo.name;
  const resetBtn = document.createElement('button');
  resetBtn.textContent = 'Reset';
  header.appendChild(resetBtn);
  card.appendChild(header);

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  card.appendChild(canvas);
  container.appendChild(card);

  const ctx = canvas.getContext('2d');
  let engine = new PhysicsEngine();
  demo.setup(engine);

  resetBtn.addEventListener('click', () => {
    engine.free();
    engine = new PhysicsEngine();
    demo.setup(engine);
  });

  // Mouse interaction
  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY,
    };
  }

  canvas.addEventListener('mousedown', (e) => {
    const pos = getMousePos(e);
    const bodyId = engine.bodyAtPoint(pos.x, pos.y);
    if (bodyId >= 0) {
      engine.startDrag(bodyId, pos.x, pos.y);
      canvas.classList.add('dragging');
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    const pos = getMousePos(e);
    engine.moveDrag(pos.x, pos.y);
  });

  canvas.addEventListener('mouseup', () => {
    engine.endDrag();
    canvas.classList.remove('dragging');
  });

  canvas.addEventListener('mouseleave', () => {
    engine.endDrag();
    canvas.classList.remove('dragging');
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getMousePos(touch);
    const bodyId = engine.bodyAtPoint(pos.x, pos.y);
    if (bodyId >= 0) {
      engine.startDrag(bodyId, pos.x, pos.y);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getMousePos(touch);
    engine.moveDrag(pos.x, pos.y);
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    engine.endDrag();
  });

  function render() {
    const result = engine.update(DELTA);
    ctx.clearRect(0, 0, W, H);

    for (const body of result.bodies) {
      const verts = body.vertices;
      if (verts.length < 2) continue;

      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) {
        ctx.lineTo(verts[i].x, verts[i].y);
      }
      ctx.closePath();

      if (body.isStatic) {
        ctx.fillStyle = 'rgba(139, 148, 158, 0.15)';
        ctx.strokeStyle = '#8b949e';
      } else {
        ctx.fillStyle = 'rgba(88, 166, 255, 0.15)';
        ctx.strokeStyle = '#58a6ff';
      }
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    requestAnimationFrame(render);
  }

  requestAnimationFrame(render);
}

const container = document.getElementById('demos');
for (const demo of demos) {
  createDemo(demo, container);
}
</script>
</body>
</html>
